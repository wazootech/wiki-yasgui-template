name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  wiki:
    name: Wiki check + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install wazootech-wiki
      - run: wiki -c sample/wiki.yml check --strict -v
      - run: wiki -c sample/wiki.yml lint --strict -v
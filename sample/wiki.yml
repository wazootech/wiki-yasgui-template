# Sample vault for wiki-yasgui-template (export, live SPARQL, Virtuoso load).
wiki:
  inputs:
    - wiki
  filename_pattern: "[A-Za-z0-9_()-]+\\.md"

graph:
  content_predicate: schema:articleBody
  context:
    schema: https://schema.org/
    wiki: https://wazootech.github.io/wiki-yasgui-template/sample/wiki/
    rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
    xsd: http://www.w3.org/2001/XMLSchema#

sparql_service:
  enabled: true
  path: /api/sparql
